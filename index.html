<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Board — Beige Tones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --beige-100: #FDFCFA;
            --beige-200: #F5F0E8;
            --beige-300: #E8DFD4;
            --beige-400: #D4C5B5;
            --beige-500: #C4B49A;
            --beige-600: #B8A88C;
            --beige-700: #A69076;
            --charcoal: #2A2A2A;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--beige-100);
            color: var(--charcoal);
            line-height: 1.4;
            overflow-x: hidden;
        }
        
        .serif { 
            font-family: 'Cormorant Garamond', serif; 
            font-weight: 300;
        }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* Fixed subtle logo */
        .logo-subtle {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 1000;
            height: 32px;
            width: auto;
            opacity: 0.4;
            filter: grayscale(100%) brightness(0.5);
            transition: opacity 0.3s ease;
        }
        
        .logo-subtle:hover {
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .logo-subtle { top: 24px; right: 24px; height: 28px; }
        }

        /* HERO — Full bleed beige gradient */
        .mood-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: linear-gradient(180deg, var(--beige-100) 0%, var(--beige-300) 50%, var(--beige-400) 100%);
            position: relative;
        }

        .mood-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--beige-500), transparent);
            opacity: 0.5;
        }

        .mood-title {
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--beige-700);
            margin-bottom: 24px;
            font-weight: 400;
        }

        .mood-hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 300;
            font-style: italic;
            color: var(--beige-600);
            text-align: center;
            line-height: 1;
            letter-spacing: -2px;
        }

        .mood-subtitle {
            font-size: 13px;
            color: var(--beige-700);
            margin-top: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--beige-600), transparent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* COLOR STRIP — Horizontal degradation */
        .color-strip {
            display: flex;
            height: 120px;
            width: 100%;
        }

        .color-block {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
        }

        .color-block:hover {
            flex: 1.5;
        }

        .color-hex {
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .color-block:hover .color-hex {
            opacity: 1;
            transform: translateY(0);
        }

        /* MOOD GRID — Asymmetric layout */
        .mood-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            background: var(--beige-300);
        }

        @media (min-width: 768px) {
            .mood-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1200px) {
            .mood-grid { grid-template-columns: repeat(12, 1fr); }
        }

        .mood-item {
            position: relative;
            overflow: hidden;
            background: var(--beige-200);
        }

        /* Custom sizing for visual rhythm */
        @media (min-width: 1200px) {
            .mood-item:nth-child(1) { grid-column: span 7; aspect-ratio: 4/3; }
            .mood-item:nth-child(2) { grid-column: span 5; aspect-ratio: 3/4; }
            .mood-item:nth-child(3) { grid-column: span 4; aspect-ratio: 1/1; }
            .mood-item:nth-child(4) { grid-column: span 4; aspect-ratio: 1/1; }
            .mood-item:nth-child(5) { grid-column: span 4; aspect-ratio: 1/1; }
            .mood-item:nth-child(6) { grid-column: span 6; aspect-ratio: 16/9; }
            .mood-item:nth-child(7) { grid-column: span 6; aspect-ratio: 16/9; }
        }

        @media (min-width: 768px) and (max-width: 1199px) {
            .mood-item:nth-child(1) { aspect-ratio: 16/9; }
            .mood-item:nth-child(4) { aspect-ratio: 16/9; }
        }

        .mood-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            filter: sepia(15%) saturate(0.9);
        }

        .mood-item:hover img {
            transform: scale(1.03);
            filter: sepia(5%) saturate(1);
        }

        /* Minimal overlay on hover */
        .mood-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(166,144,118,0.6) 0%, transparent 100%);
            opacity: 0;
            transition: all 0.5s ease;
        }

        .mood-item:hover .mood-overlay {
            opacity: 1;
        }

        /* TEXTURE SECTION — Beige gradients */
        .texture-section {
            padding: 120px 60px;
            background: linear-gradient(135deg, var(--beige-200) 0%, var(--beige-300) 50%, var(--beige-400) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .texture-section { padding: 80px 30px; }
        }

        .texture-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-style: italic;
            color: var(--beige-700);
            text-align: center;
        }

        .texture-swatches {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .texture-swatch {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .texture-swatch:hover {
            transform: scale(1.1);
        }

        /* FOOTER — Minimal */
        .mood-footer {
            padding: 80px 60px;
            background: var(--beige-400);
            text-align: center;
        }

        @media (max-width: 768px) {
            .mood-footer { padding: 60px 30px; }
        }

        .footer-line {
            width: 40px;
            height: 1px;
            background: var(--beige-600);
            margin: 0 auto 32px;
        }

        .footer-credit {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--beige-700);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--beige-600);
            color: white;
            padding: 14px 28px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Reveal animation */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Subtle Logo -->
    <img src="https://i.imgur.com/uJqy10F.jpeg" alt="Logo" class="logo-subtle">

    <!-- HERO -->
    <section class="mood-hero">
        <p class="mood-title reveal">Mood Board</p>
        <h1 class="reveal" style="transition-delay: 0.1s;">Beige Tones</h1>
        <p class="mood-subtitle reveal" style="transition-delay: 0.2s;">A Study in Neutrals</p>
        <div class="scroll-hint"></div>
    </section>

    <!-- COLOR STRIP — 7 Beige Degradations -->
    <div class="color-strip">
        <div class="color-block" style="background: #FDFCFA;" onclick="copyColor('#FDFCFA')">
            <span class="color-hex" style="color: var(--beige-700);">#FDFCFA</span>
        </div>
        <div class="color-block" style="background: #F5F0E8;" onclick="copyColor('#F5F0E8')">
            <span class="color-hex" style="color: var(--beige-700);">#F5F0E8</span>
        </div>
        <div class="color-block" style="background: #E8DFD4;" onclick="copyColor('#E8DFD4')">
            <span class="color-hex">#E8DFD4</span>
        </div>
        <div class="color-block" style="background: #D4C5B5;" onclick="copyColor('#D4C5B5')">
            <span class="color-hex">#D4C5B5</span>
        </div>
        <div class="color-block" style="background: #C4B49A;" onclick="copyColor('#C4B49A')">
            <span class="color-hex">#C4B49A</span>
        </div>
        <div class="color-block" style="background: #B8A88C;" onclick="copyColor('#B8A88C')">
            <span class="color-hex">#B8A88C</span>
        </div>
        <div class="color-block" style="background: #A69076;" onclick="copyColor('#A69076')">
            <span class="color-hex">#A69076</span>
        </div>
    </div>

    <!-- MOOD GRID — 7 Images -->
    <section class="mood-grid">
        <div class="mood-item reveal">
            <img src="https://i.imgur.com/8m1GSZz.jpeg" alt="Mood Image 1" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
        
        <div class="mood-item reveal" style="transition-delay: 0.1s;">
            <img src="https://i.imgur.com/3LSIEqO.jpeg" alt="Mood Image 2" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
        
        <div class="mood-item reveal" style="transition-delay: 0.2s;">
            <img src="https://i.imgur.com/Yp56Fay.jpeg" alt="Mood Image 3" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
        
        <div class="mood-item reveal" style="transition-delay: 0.1s;">
            <img src="https://i.imgur.com/OK6TBMw.jpeg" alt="Mood Image 4" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
        
        <div class="mood-item reveal" style="transition-delay: 0.2s;">
            <img src="https://i.imgur.com/l6zkeWt.jpeg" alt="Mood Image 5" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
        
        <div class="mood-item reveal" style="transition-delay: 0.3s;">
            <img src="https://i.imgur.com/gl9zlbO.jpeg" alt="Mood Image 6" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
        
        <div class="mood-item reveal" style="transition-delay: 0.1s;">
            <img src="https://i.imgur.com/04qCd2i.jpeg" alt="Mood Image 7" loading="lazy">
            <div class="mood-overlay"></div>
        </div>
    </section>

    <!-- TEXTURE SECTION -->
    <section class="texture-section">
        <p class="texture-title serif reveal">The Complete Spectrum</p>
        <div class="texture-swatches reveal" style="transition-delay: 0.1s;">
            <div class="texture-swatch" style="background: #FDFCFA; border: 1px solid #E8DFD4;"></div>
            <div class="texture-swatch" style="background: #F5F0E8;"></div>
            <div class="texture-swatch" style="background: #E8DFD4;"></div>
            <div class="texture-swatch" style="background: #D4C5B5;"></div>
            <div class="texture-swatch" style="background: #C4B49A;"></div>
            <div class="texture-swatch" style="background: #B8A88C;"></div>
            <div class="texture-swatch" style="background: #A69076;"></div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="mood-footer">
        <div class="footer-line"></div>
        <p class="footer-credit">Designed by Mohamed Tunis</p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast">Color copied</div>

    <!-- Scripts -->
    <script>
        // Intersection Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Copy color
        function copyColor(hex) {
            navigator.clipboard.writeText(hex).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            });
        }
    </script>

</body>
</html>
